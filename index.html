<script>
const params = new URLSearchParams(window.location.search);

// 🎁 Get dynamic values
const message = params.get("msg") || "🎁 Surprise!";
const timeParam = params.get("time");

// Default fallback (1 hour from now)
let unlockTime = new Date();
unlockTime.setHours(unlockTime.getHours() + 1);

if (timeParam) {
    unlockTime = new Date(timeParam);
}

function update() {
    const now = new Date();

    if (now >= unlockTime) {
        document.getElementById("title").innerText = "🎉 It’s Time!";
        document.getElementById("locked").style.display = "none";
        document.getElementById("unlocked").classList.remove("hidden");
        document.getElementById("message").innerText = decodeURIComponent(message);
    } else {
        const diff = unlockTime - now;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("countdown").innerText =
            `Unlocks in ${hours}h ${minutes}m ${seconds}s`;
    }
}

setInterval(update, 1000);
update();
</script>
