<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Midnight Gift</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #000000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.box {
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    max-width: 400px;
}

.hidden {
    display: none;
}

#message {
    white-space: pre-line;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="box">
    <h1 id="title">⏳ A Moment Waiting...</h1>

    <div id="locked">
        <p>You can scan now…</p>
        <p>But some things are meant for the right time 🌙</p>
        <p id="countdown"></p>
    </div>

    <div id="unlocked" class="hidden">
        <h2>🎁 It’s Time...</h2>
        <p id="message"></p>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const params = new URLSearchParams(window.location.search);

    // 🔓 Decode function
    function decodeMessage(encoded) {
        try {
            return atob(decodeURIComponent(encoded));
        } catch {
            return "🎁 Surprise!";
        }
    }

    // 🎁 Get message (decoded)
    const message = params.get("msg") 
        ? decodeMessage(params.get("msg")) 
        : "🎁 Surprise!";

    // ⏰ Get unlock time
    const timeParam = params.get("time");

    let unlockTime = new Date();
    unlockTime.setHours(unlockTime.getHours() + 1); // fallback

    if (timeParam) {
        unlockTime = new Date(timeParam);
    }

    function update() {
        const now = new Date();

        if (now >= unlockTime) {
            document.getElementById("title").innerText = "🎉 Opened!";
            document.getElementById("locked").style.display = "none";
            document.getElementById("unlocked").classList.remove("hidden");
            document.getElementById("message").innerText = message;
        } else {
            const diff = unlockTime - now;

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("countdown").innerText =
                `Unlocks in ${hours}h ${minutes}m ${seconds}s`;
        }
    }

    setInterval(update, 1000);
    update();
});
</script>

</body>
</html>
